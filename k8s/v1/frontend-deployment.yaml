# k8s/v1/frontend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alchemist-frontend
  labels:
    app: alchemist-frontend
    app.kubernetes.io/part-of: alchemist-battle
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: alchemist-frontend
  template:
    metadata:
      labels:
        app: alchemist-frontend
        version: v1
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: frontend
          image: image-registry.openshift-image-registry.svc:5000/alchemist-battle/alchemist-frontend-v1:latest
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
