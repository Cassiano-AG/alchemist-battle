# k8s/database/fallback-sem-operador/postgres.yaml
# Alternativa para clusters SEM o Crunchy Operator (Fases 1 e 2, ou CRC/SNO).
# Cria manualmente um Secret com as MESMAS chaves que o operador geraria,
# então os Deployments do backend funcionam sem nenhuma alteração.
# Aplicar com: oc apply -f k8s/database/fallback-sem-operador/postgres.yaml
---
apiVersion: v1
kind: Secret
metadata:
  name: alchemist-db-pguser-alchemist
  namespace: alchemist-battle
  labels:
    app.kubernetes.io/part-of: alchemist-battle
type: Opaque
stringData:
  host: alchemist-db
  port: "5432"
  dbname: alchemist
  user: alchemist
  password: trocar-esta-senha-na-demo
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alchemist-db-data
  namespace: alchemist-battle
  labels:
    app.kubernetes.io/part-of: alchemist-battle
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alchemist-db
  namespace: alchemist-battle
  labels:
    app: alchemist-db
    app.kubernetes.io/part-of: alchemist-battle
spec:
  replicas: 1
  strategy:
    type: Recreate   # volume RWO: evita dois pods presos no mesmo PVC
  selector:
    matchLabels:
      app: alchemist-db
  template:
    metadata:
      labels:
        app: alchemist-db
    spec:
      containers:
        - name: postgresql
          # Imagem PostgreSQL da Red Hat: roda com UID arbitrário (SCC restricted-v2).
          image: registry.redhat.io/rhel9/postgresql-16:latest
          ports:
            - name: pg
              containerPort: 5432
          env:
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: alchemist-db-pguser-alchemist
                  key: dbname
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: alchemist-db-pguser-alchemist
                  key: user
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: alchemist-db-pguser-alchemist
                  key: password
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: alchemist-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: alchemist-db
  namespace: alchemist-battle
  labels:
    app: alchemist-db
    app.kubernetes.io/part-of: alchemist-battle
spec:
  selector:
    app: alchemist-db
  ports:
    - name: pg
      port: 5432
      targetPort: pg
