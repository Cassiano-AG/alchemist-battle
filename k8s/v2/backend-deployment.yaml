# k8s/v2/backend-deployment.yaml
# Mesmo nome/selector da v1 -> aplicar esta pasta dispara o RollingUpdate.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alchemist-backend
  labels:
    app: alchemist-backend
    app.kubernetes.io/part-of: alchemist-battle
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: alchemist-backend
  template:
    metadata:
      labels:
        app: alchemist-backend
        version: v2
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: image-registry.openshift-image-registry.svc:5000/alchemist-battle/alchemist-backend-v2:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: alchemist-db-pguser-alchemist
                  key: host
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: alchemist-db-pguser-alchemist
                  key: port
            - name: PG_DATABASE
              valueFrom:
                secretKeyRef:
                  name: alchemist-db-pguser-alchemist
                  key: dbname
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: alchemist-db-pguser-alchemist
                  key: user
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: alchemist-db-pguser-alchemist
                  key: password
          envFrom:
            - configMapRef:
                name: game-config
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
