# frontend/v1/nginx.conf
# Servido pelo nginx-unprivileged (porta 8080, sem root - compatível com SCC restricted-v2).
server {
    listen 8080;
    server_name _;

    # Probe simples para liveness/readiness do frontend.
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Proxy interno para o backend (Service "alchemist-backend" no mesmo namespace).
    location /api/ {
        proxy_pass http://alchemist-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}
